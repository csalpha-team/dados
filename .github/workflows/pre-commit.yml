---
name: pre-commit
on:
  pull_request:
  push:
    branches: [main]
jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: 0.11.2
      - name: Sync dependencies
        run: uv sync --dev
      - name: Run pre-commit
        run: uv run pre-commit run --all-files --show-diff-on-failure
